#############################################################################################
# pre-commit — language-agnostic hooks for this NON-python API repo (proto sources + clients).#
# Language-specific tooling stays with each generated client's own toolchain. Ruff/mypy/uv    #
# are python-only and are intentionally NOT included here.                                     #
#                                                                                              #
# - pre-commit hooks run on staged files just before a commit or push                          #
# - to run a hook on demand:  pre-commit run <HOOK_ID> --files <FILE1> <FILE2> ...             #
#############################################################################################

# Never touch generated / vendored code: the generated API docs (docs/index.*), the vendored  #
# google/* proto tree, the git-submodule client dirs, and any *.pb.* generated stubs. The      #
# ondewo/**/*.proto SOURCE files stay lintable by trailing-whitespace/end-of-file-fixer.       #
exclude: '^(docs/|google/|ondewo-nlu-api/|ondewo-s2t-api/|ondewo-sip-api/|ondewo-t2s-api/)|\.pb\.'

fail_fast: false

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
