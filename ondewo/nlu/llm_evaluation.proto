syntax = "proto3";

package ondewo.nlu;

import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "ondewo/nlu/operations.proto";

// LangSmith-style evaluation surface: datasets, examples, experiments, evaluator
// runs, feedback (LLM-as-judge / human / heuristic / custom code / pairwise),
// pairwise comparisons, release gates + persisted gate runs, scorecards,
// per-project evaluation settings (judge configuration), the evaluator registry,
// golden-transcript recording from sessions, conversation simulation
// (standard + adversarial red-teaming), recurring schedules and report artifacts.
service LlmEvaluations {

    // region datasets

    // Create a new evaluation dataset.
    rpc LlmEvaluationCreateDataset (CreateLlmEvaluationDatasetRequest) returns (LlmEvaluationDataset);

    // Get an evaluation dataset by resource name.
    rpc LlmEvaluationGetDataset (GetLlmEvaluationDatasetRequest) returns (LlmEvaluationDataset);

    // List evaluation datasets in the project, optionally filtered + paginated.
    rpc LlmEvaluationListDatasets (ListLlmEvaluationDatasetsRequest) returns (ListLlmEvaluationDatasetsResponse);

    // Update metadata of an existing evaluation dataset (examples managed via Add/Update/Delete RPCs).
    rpc LlmEvaluationUpdateDataset (UpdateLlmEvaluationDatasetRequest) returns (LlmEvaluationDataset);

    // Delete an evaluation dataset and all owned examples.
    rpc LlmEvaluationDeleteDataset (DeleteLlmEvaluationDatasetRequest) returns (google.protobuf.Empty);

    // endregion datasets

    // region examples

    // Add a single example to an existing dataset.
    rpc LlmEvaluationAddExample (AddLlmEvaluationExampleRequest) returns (LlmEvaluationExample);

    // Add multiple examples to an existing dataset in one call.
    rpc LlmEvaluationAddExamples (AddLlmEvaluationExamplesRequest) returns (AddLlmEvaluationExamplesResponse);

    // Get a single evaluation example by resource name.
    rpc LlmEvaluationGetExample (GetLlmEvaluationExampleRequest) returns (LlmEvaluationExample);

    // List examples in a dataset, optionally filtered + paginated.
    rpc LlmEvaluationListExamples (ListLlmEvaluationExamplesRequest) returns (ListLlmEvaluationExamplesResponse);

    // Update fields of an existing evaluation example.
    rpc LlmEvaluationUpdateExample (UpdateLlmEvaluationExampleRequest) returns (LlmEvaluationExample);

    // Delete an evaluation example.
    rpc LlmEvaluationDeleteExample (DeleteLlmEvaluationExampleRequest) returns (google.protobuf.Empty);

    // endregion examples

    // region experiments

    // Run a fresh experiment over a dataset. Long-running operation: the returned
    // Operation resolves to the completed LlmEvaluationExperiment once all
    // evaluators have produced feedback.
    rpc LlmEvaluationRunExperiment (RunLlmEvaluationExperimentRequest) returns (ondewo.nlu.Operation);

    // Retrieve a previously-run experiment by resource name.
    rpc LlmEvaluationGetExperiment (GetLlmEvaluationExperimentRequest) returns (LlmEvaluationExperiment);

    // List experiments in a project, optionally filtered + paginated.
    rpc LlmEvaluationListExperiments (ListLlmEvaluationExperimentsRequest) returns (ListLlmEvaluationExperimentsResponse);

    // Update metadata of an experiment (e.g. baseline pointer, display_name).
    // Evaluator runs and feedback are immutable; use LlmEvaluationSubmitFeedback /
    // LlmEvaluationDeleteFeedback for downstream annotations.
    rpc LlmEvaluationUpdateExperiment (UpdateLlmEvaluationExperimentRequest) returns (LlmEvaluationExperiment);

    // Delete an experiment and all owned evaluator runs + feedbacks.
    rpc LlmEvaluationDeleteExperiment (DeleteLlmEvaluationExperimentRequest) returns (google.protobuf.Empty);

    // Cancel a still-running experiment. No-op if already finished.
    rpc LlmEvaluationCancelExperiment (CancelLlmEvaluationExperimentRequest) returns (LlmEvaluationExperiment);

    // Compare two-or-more experiments and emit a pairwise comparison report.
    rpc LlmEvaluationCompareExperiments (CompareLlmEvaluationExperimentsRequest) returns (LlmEvaluationComparison);

    // endregion experiments

    // region feedback

    // Submit a single feedback record (used by human reviewers / external evaluators).
    rpc LlmEvaluationSubmitFeedback (SubmitLlmEvaluationFeedbackRequest) returns (LlmEvaluationFeedback);

    // List feedback records, optionally filtered + paginated.
    rpc LlmEvaluationListFeedback (ListLlmEvaluationFeedbackRequest) returns (ListLlmEvaluationFeedbackResponse);

    // Delete a single feedback record.
    rpc LlmEvaluationDeleteFeedback (DeleteLlmEvaluationFeedbackRequest) returns (google.protobuf.Empty);

    // Update a single feedback record (e.g. correct a human review score or comment).
    rpc LlmEvaluationUpdateFeedback (UpdateLlmEvaluationFeedbackRequest) returns (LlmEvaluationFeedback);

    // endregion feedback

    // region release gates

    // Create a new release gate (a named set of thresholds over evaluator scores,
    // regression deltas and telemetry that decides whether a candidate configuration ships).
    rpc LlmEvaluationCreateReleaseGate (CreateLlmEvaluationReleaseGateRequest) returns (LlmEvaluationReleaseGate);

    // Get a release gate by resource name.
    rpc LlmEvaluationGetReleaseGate (GetLlmEvaluationReleaseGateRequest) returns (LlmEvaluationReleaseGate);

    // List release gates in the project, optionally filtered + paginated.
    rpc LlmEvaluationListReleaseGates (ListLlmEvaluationReleaseGatesRequest) returns (ListLlmEvaluationReleaseGatesResponse);

    // Update an existing release gate. Semantic changes (suite, baseline,
    // evaluators, thresholds, weights, safety) increment the server-managed revision.
    rpc LlmEvaluationUpdateReleaseGate (UpdateLlmEvaluationReleaseGateRequest) returns (LlmEvaluationReleaseGate);

    // Delete a release gate and all owned gate runs.
    rpc LlmEvaluationDeleteReleaseGate (DeleteLlmEvaluationReleaseGateRequest) returns (google.protobuf.Empty);

    // Run a release gate against a candidate target. Long-running operation: the
    // returned Operation resolves to the completed LlmEvaluationReleaseGateRun once
    // the candidate (and optional safety) experiments finished and the verdict has
    // been computed and persisted server-side.
    rpc LlmEvaluationRunReleaseGate (RunLlmEvaluationReleaseGateRequest) returns (ondewo.nlu.Operation);

    // Get a single release gate run (persisted verdict + checks) by resource name.
    rpc LlmEvaluationGetReleaseGateRun (GetLlmEvaluationReleaseGateRunRequest) returns (LlmEvaluationReleaseGateRun);

    // List release gate runs, optionally filtered + paginated.
    rpc LlmEvaluationListReleaseGateRuns (ListLlmEvaluationReleaseGateRunsRequest) returns (ListLlmEvaluationReleaseGateRunsResponse);

    // endregion release gates

    // region scorecards

    // Create a new scorecard (weighted multi-criteria roll-up definition).
    rpc LlmEvaluationCreateScorecard (CreateLlmEvaluationScorecardRequest) returns (LlmEvaluationScorecard);

    // Get a scorecard by resource name.
    rpc LlmEvaluationGetScorecard (GetLlmEvaluationScorecardRequest) returns (LlmEvaluationScorecard);

    // List scorecards in the project, optionally filtered + paginated.
    rpc LlmEvaluationListScorecards (ListLlmEvaluationScorecardsRequest) returns (ListLlmEvaluationScorecardsResponse);

    // Update an existing scorecard.
    rpc LlmEvaluationUpdateScorecard (UpdateLlmEvaluationScorecardRequest) returns (LlmEvaluationScorecard);

    // Delete a scorecard.
    rpc LlmEvaluationDeleteScorecard (DeleteLlmEvaluationScorecardRequest) returns (google.protobuf.Empty);

    // endregion scorecards

    // region project settings

    // Get the per-(project, language_code) evaluation settings singleton (judge
    // configuration, default weights, pass cutoffs). The server auto-creates
    // default settings on first access.
    rpc LlmEvaluationGetProjectSettings (GetLlmEvaluationProjectSettingsRequest) returns (LlmEvaluationProjectSettings);

    // Update the per-(project, language_code) evaluation settings singleton.
    rpc LlmEvaluationUpdateProjectSettings (UpdateLlmEvaluationProjectSettingsRequest) returns (LlmEvaluationProjectSettings);

    // endregion project settings

    // region evaluator registry

    // List the evaluators available on this server, with metadata describing the
    // category, required example fields, multi-turn support, default threshold,
    // judge requirement and configurable parameters of each evaluator.
    rpc LlmEvaluationListEvaluators (ListLlmEvaluationEvaluatorsRequest) returns (ListLlmEvaluationEvaluatorsResponse);

    // endregion evaluator registry

    // region golden transcripts + simulation

    // Convert a recorded session (or a selection of its session steps) into
    // evaluation examples ("golden transcripts") inside an existing dataset.
    rpc LlmEvaluationCreateExamplesFromSession (CreateLlmEvaluationExamplesFromSessionRequest) returns (CreateLlmEvaluationExamplesFromSessionResponse);

    // Generate synthetic multi-turn evaluation conversations by simulating users
    // (persona-driven; STANDARD kind) or attackers (red-teaming; ADVERSARIAL kind)
    // against the live target. Long-running operation: the returned Operation
    // resolves once the generated examples have been persisted into the receiving dataset.
    rpc LlmEvaluationSimulateConversations (SimulateLlmEvaluationConversationsRequest) returns (ondewo.nlu.Operation);

    // endregion golden transcripts + simulation

    // region schedules

    // Create a new schedule for recurring experiment / release gate runs.
    rpc LlmEvaluationCreateSchedule (CreateLlmEvaluationScheduleRequest) returns (LlmEvaluationSchedule);

    // Get a schedule by resource name.
    rpc LlmEvaluationGetSchedule (GetLlmEvaluationScheduleRequest) returns (LlmEvaluationSchedule);

    // List schedules in the project, optionally filtered + paginated.
    rpc LlmEvaluationListSchedules (ListLlmEvaluationSchedulesRequest) returns (ListLlmEvaluationSchedulesResponse);

    // Update an existing schedule (cron / interval, enabled flag, request template).
    rpc LlmEvaluationUpdateSchedule (UpdateLlmEvaluationScheduleRequest) returns (LlmEvaluationSchedule);

    // Delete a schedule. Experiments / gate runs already created by it are kept.
    rpc LlmEvaluationDeleteSchedule (DeleteLlmEvaluationScheduleRequest) returns (google.protobuf.Empty);

    // endregion schedules

    // region reports

    // Persist a generated report as an immutable artifact (incl. payload bytes).
    rpc LlmEvaluationCreateReport (CreateLlmEvaluationReportRequest) returns (LlmEvaluationReport);

    // Get a report by resource name (incl. payload bytes).
    rpc LlmEvaluationGetReport (GetLlmEvaluationReportRequest) returns (LlmEvaluationReport);

    // List reports, optionally filtered + paginated. Payload bytes are omitted
    // unless explicitly requested via field_mask.
    rpc LlmEvaluationListReports (ListLlmEvaluationReportsRequest) returns (ListLlmEvaluationReportsResponse);

    // Delete a report.
    rpc LlmEvaluationDeleteReport (DeleteLlmEvaluationReportRequest) returns (google.protobuf.Empty);

    // endregion reports

    // region a/b experiments

    // Create a new A/B experiment (a set of routing variants over live
    // DetectIntent traffic). Created in DRAFT status; traffic is only split once
    // it is started via LlmEvaluationStartAbExperiment.
    rpc LlmEvaluationCreateAbExperiment (CreateLlmEvaluationAbExperimentRequest) returns (LlmEvaluationAbExperiment);

    // Get an A/B experiment by resource name.
    rpc LlmEvaluationGetAbExperiment (GetLlmEvaluationAbExperimentRequest) returns (LlmEvaluationAbExperiment);

    // List A/B experiments in the project, optionally filtered + paginated.
    rpc LlmEvaluationListAbExperiments (ListLlmEvaluationAbExperimentsRequest) returns (ListLlmEvaluationAbExperimentsResponse);

    // Update an existing A/B experiment (variants, traffic config, metadata).
    // Only allowed in DRAFT / STOPPED status; running experiments must be stopped first.
    rpc LlmEvaluationUpdateAbExperiment (UpdateLlmEvaluationAbExperimentRequest) returns (LlmEvaluationAbExperiment);

    // Delete an A/B experiment and all owned sticky-assignment rows.
    rpc LlmEvaluationDeleteAbExperiment (DeleteLlmEvaluationAbExperimentRequest) returns (google.protobuf.Empty);

    // Start an A/B experiment: validates that the variant traffic weights are
    // well-formed (sum to the configured total), stamps started_at and transitions
    // the experiment to RUNNING so live traffic begins to be split.
    rpc LlmEvaluationStartAbExperiment (StartLlmEvaluationAbExperimentRequest) returns (LlmEvaluationAbExperiment);

    // Stop a running A/B experiment: stamps stopped_at and transitions to STOPPED.
    // Existing sticky assignments are retained for results computation.
    rpc LlmEvaluationStopAbExperiment (StopLlmEvaluationAbExperimentRequest) returns (LlmEvaluationAbExperiment);

    // Compute per-variant telemetry rollups for an A/B experiment. Stateless /
    // computed on demand: gathers each variant's sessions and aggregates their
    // LlmTelemetry into a per-variant LlmTelemetryReport. There is no auto-rollout.
    rpc LlmEvaluationGetAbExperimentResults (GetLlmEvaluationAbExperimentResultsRequest) returns (GetLlmEvaluationAbExperimentResultsResponse);

    // endregion a/b experiments

    // region a/b rollout

    // Compute a rollout recommendation for an A/B experiment: which variant wins
    // against the control on the chosen optimize metric under the supplied
    // statistical guard-rails (confidence level, minimum sessions per variant,
    // minimum effect size). Stateless / read-only — computed on demand from the
    // per-variant results; nothing is persisted and no traffic / config changes.
    rpc LlmEvaluationGetAbRolloutRecommendation (GetLlmEvaluationAbRolloutRecommendationRequest) returns (LlmEvaluationAbRolloutRecommendation);

    // Apply a rollout for an A/B experiment: promotes the chosen variant's config
    // as the project's classifier default, stops the experiment, and writes +
    // returns the LlmEvaluationAbRolloutDecision audit record. The operator picks
    // the variant explicitly (there is no auto-rollout). Idempotent: re-applying
    // an already-rolled-out experiment returns the existing decision.
    rpc LlmEvaluationApplyAbRollout (ApplyLlmEvaluationAbRolloutRequest) returns (LlmEvaluationAbRolloutDecision);

    // Get the applied rollout decision (audit record) by resource name.
    rpc LlmEvaluationGetAbRolloutDecision (GetLlmEvaluationAbRolloutDecisionRequest) returns (LlmEvaluationAbRolloutDecision);

    // List applied rollout decisions in the project, optionally filtered (e.g. by
    // experiment) + paginated.
    rpc LlmEvaluationListAbRolloutDecisions (ListLlmEvaluationAbRolloutDecisionsRequest) returns (ListLlmEvaluationAbRolloutDecisionsResponse);

    // endregion a/b rollout

    // region online evaluation

    // Create a new online-evaluation config: a per-(project, language_code)
    // definition selecting a reference-free evaluator set + a sample rate. A
    // swarm-safe background worker samples already-persisted live session steps,
    // scores the recorded answer with these evaluators and enqueues failing steps
    // into the annotation queue.
    rpc LlmEvaluationCreateOnlineConfig (CreateLlmEvaluationOnlineConfigRequest) returns (LlmEvaluationOnlineConfig);

    // Get an online-evaluation config by resource name.
    rpc LlmEvaluationGetOnlineConfig (GetLlmEvaluationOnlineConfigRequest) returns (LlmEvaluationOnlineConfig);

    // List online-evaluation configs in the project, optionally filtered + paginated.
    rpc LlmEvaluationListOnlineConfigs (ListLlmEvaluationOnlineConfigsRequest) returns (ListLlmEvaluationOnlineConfigsResponse);

    // Update an existing online-evaluation config (enabled flag, evaluator set,
    // sample rate, thresholds, session filter).
    rpc LlmEvaluationUpdateOnlineConfig (UpdateLlmEvaluationOnlineConfigRequest) returns (LlmEvaluationOnlineConfig);

    // Delete an online-evaluation config. Already-produced online results and
    // annotation-queue items are kept.
    rpc LlmEvaluationDeleteOnlineConfig (DeleteLlmEvaluationOnlineConfigRequest) returns (google.protobuf.Empty);

    // endregion online evaluation

    // region online results

    // Get a single online-evaluation result (per scored session step) by resource name.
    rpc LlmEvaluationGetOnlineResult (GetLlmEvaluationOnlineResultRequest) returns (LlmEvaluationOnlineResult);

    // List online-evaluation results, optionally filtered by config / pass-state + paginated.
    // Read-only: result rows are produced by the online-evaluation worker (no Create RPC).
    rpc LlmEvaluationListOnlineResults (ListLlmEvaluationOnlineResultsRequest) returns (ListLlmEvaluationOnlineResultsResponse);

    // endregion online results

    // region annotation queue

    // Get a single annotation-queue item by resource name.
    rpc LlmEvaluationGetAnnotationQueueItem (GetLlmEvaluationAnnotationQueueItemRequest) returns (LlmEvaluationAnnotationQueueItem);

    // List annotation-queue items, optionally filtered by status / assignee + paginated.
    // Items are enqueued by the online-evaluation worker (no Create RPC).
    rpc LlmEvaluationListAnnotationQueueItems (ListLlmEvaluationAnnotationQueueItemsRequest) returns (ListLlmEvaluationAnnotationQueueItemsResponse);

    // Update an annotation-queue item (status / assignee / reason transitions:
    // PENDING -> REVIEWED / DISMISSED).
    rpc LlmEvaluationUpdateAnnotationQueueItem (UpdateLlmEvaluationAnnotationQueueItemRequest) returns (LlmEvaluationAnnotationQueueItem);

    // Promote an annotation-queue item into a regression dataset. Thin server-side
    // composition: delegates to LlmEvaluationCreateExamplesFromSession with the
    // item's session (+ selected steps), flips the item status to PROMOTED and
    // stamps the promoted dataset name. Returns the created example(s).
    rpc LlmEvaluationPromoteAnnotationQueueItem (PromoteLlmEvaluationAnnotationQueueItemRequest) returns (PromoteLlmEvaluationAnnotationQueueItemResponse);

    // endregion annotation queue

}

// region domain messages

// A dataset is a named collection of evaluation examples plus optional metadata.
message LlmEvaluationDataset {
    // The unique resource name of the dataset. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;</code>.
    string name = 1;

    // Required. Human-readable display name (unique within the (project, language_code) tuple).
    string display_name = 2;

    // Free-form description.
    string description = 3;

    // Examples contained in this dataset. May be returned empty by List endpoints;
    // use ListExamples for paginated retrieval.
    repeated LlmEvaluationExample llm_evaluation_examples = 4;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 5;

    // User id in form of a valid UUID.
    string created_by = 6;

    // Free-form tags for grouping / filtering.
    repeated string tags = 7;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 8;

    // User id in form of a valid UUID.
    string modified_by = 9;

    // Project owning the dataset.
    // Format: <code>projects/&lt;project_uuid&gt;/agent</code>.
    string parent = 10;

    // BCP-47 language code (e.g. <code>"en"</code>, <code>"de"</code>, <code>"en-US"</code>)
    // identifying which language the dataset was authored for. Datasets are
    // scoped per (project, language_code) — the same dataset name may exist
    // independently per language.
    string language_code = 11;

    // Kind of examples the dataset holds (single-turn, multi-turn conversation
    // flow, RAG question-answering, adversarial red-team probes, simulated).
    LlmEvaluationDatasetType llm_evaluation_dataset_type = 12;
}

// A single example in an evaluation dataset.
message LlmEvaluationExample {
    // The unique resource name of the example. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;/examples/&lt;example_uuid&gt;</code>.
    string name = 1;

    // Human-readable display name.
    string display_name = 2;

    // Free-form description.
    string description = 3;

    // Structured inputs payload — agent inputs, prompt vars, retrieval context, ...
    google.protobuf.Struct inputs = 4;

    // Structured expected outputs — gold answer, expected tool sequence, ...
    google.protobuf.Struct expected_outputs = 5;

    // Free-form metadata.
    google.protobuf.Struct metadata = 6;

    // Resource name of the owning dataset.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;</code>.
    string llm_evaluation_dataset_name = 7;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 8;

    // User id in form of a valid UUID.
    string created_by = 9;

    // Project owning the example (denormalized from parent dataset for cheap
    // per-project filtering). Format: <code>projects/&lt;project_uuid&gt;/agent</code>.
    string parent = 10;

    // BCP-47 language code (denormalized from parent dataset for cheap filtering).
    string language_code = 11;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 12;

    // User id in form of a valid UUID.
    string modified_by = 13;
}

// A single experiment run over a dataset.
message LlmEvaluationExperiment {
    // The unique resource name of the experiment. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string name = 1;

    // Resource name of the source dataset.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;</code>.
    string llm_evaluation_dataset_name = 2;

    // Required. Human-readable display name.
    string display_name = 3;

    // Free-form description.
    string description = 4;

    // Pin the experiment to a source-tree revision for reproducibility.
    string git_sha = 5;

    // Logical version identifier of the prompt under test.
    string prompt_version = 6;

    // Concrete model identifier exercised by the experiment.
    string model_name = 7;

    // Arbitrary configuration captured at run time.
    google.protobuf.Struct config = 8;

    // One entry per evaluator x example combination.
    repeated LlmEvaluationEvaluatorRun llm_evaluation_evaluator_runs = 9;

    // Wall-clock start of the experiment run.
    google.protobuf.Timestamp started_at = 10;

    // Wall-clock end of the experiment run.
    google.protobuf.Timestamp finished_at = 11;

    // Convenience duration (finished_at - started_at).
    double duration_in_s = 12;

    // Number of dataset examples consumed.
    int32 n_examples = 13;

    // Number of evaluator runs that produced a passing score.
    int32 n_passed = 14;

    // Number of evaluator runs that produced a failing score.
    int32 n_failed = 15;

    // Optional. Resource name of a baseline experiment for regression detection.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string llm_evaluation_baseline_experiment_name = 16;

    // Project owning the experiment.
    // Format: <code>projects/&lt;project_uuid&gt;/agent</code>.
    string parent = 17;

    // Current lifecycle status of the experiment (pending / running / succeeded /
    // failed / cancelled).
    LlmEvaluationExperimentStatus llm_evaluation_experiment_status = 18;

    // User id in form of a valid UUID.
    string created_by = 19;

    // BCP-47 language code (denormalized from parent dataset). Experiments are
    // scoped per (project, language_code); experiment name uniqueness is
    // enforced per (project, language_code) tuple.
    string language_code = 20;

    // CcaiService name(s) whose LLM connection details defined the model(s) evaluated in this run
    // (echoed from RunLlmEvaluationExperimentRequest for audit / reproducibility).
    repeated string ccai_service_names = 21;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 22;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 23;

    // User id in form of a valid UUID.
    string modified_by = 24;

    // Number of repetitions each (example, evaluator) pair was executed with
    // (echoed from RunLlmEvaluationExperimentRequest; 0 is treated as 1).
    int32 repetitions = 25;

    // Optional. Resource name of the schedule that created this experiment
    // (empty for manually-triggered experiments).
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationSchedules/&lt;schedule_uuid&gt;</code>.
    string llm_evaluation_schedule_name = 26;

    // Kind of experiment (standard single-turn, multi-turn flow, red-team,
    // gate candidate, gate safety, scheduled).
    LlmEvaluationExperimentKind llm_evaluation_experiment_kind = 27;

    // Optional. Resource name of the release gate run this experiment belongs to
    // (set for gate-candidate and gate-safety experiments).
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationReleaseGates/&lt;gate_uuid&gt;/runs/&lt;run_uuid&gt;</code>.
    string llm_evaluation_release_gate_run_name = 28;
}

// Lifecycle status of an experiment.
enum LlmEvaluationExperimentStatus {
    // Default / unset.
    LLM_EVALUATION_EXPERIMENT_STATUS_UNSPECIFIED = 0;

    // Queued, not yet started.
    LLM_EVALUATION_EXPERIMENT_STATUS_PENDING = 1;

    // Currently running.
    LLM_EVALUATION_EXPERIMENT_STATUS_RUNNING = 2;

    // Finished successfully.
    LLM_EVALUATION_EXPERIMENT_STATUS_SUCCEEDED = 3;

    // Finished with errors.
    LLM_EVALUATION_EXPERIMENT_STATUS_FAILED = 4;

    // Cancelled by user request.
    LLM_EVALUATION_EXPERIMENT_STATUS_CANCELLED = 5;
}

// Result of running one evaluator against one example.
message LlmEvaluationEvaluatorRun {
    // The unique resource name of the evaluator run. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;/evaluatorRuns/&lt;evaluator_run_uuid&gt;</code>.
    string name = 1;

    // Human-readable display name.
    string display_name = 2;

    // Resource name of the example the evaluator was run against.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;/examples/&lt;example_uuid&gt;</code>.
    string llm_evaluation_example_name = 3;

    // Ties this evaluator run back to the LlmTelemetry produced when running the target.
    string llm_telemetry_run_id = 4;

    // Family of evaluator implementations.
    LlmEvaluationEvaluatorType llm_evaluation_evaluator_type = 5;

    // Logical name of the evaluator (e.g. "faithfulness", "exact_match").
    string evaluator_name = 6;

    // One or more feedback records produced by the evaluator.
    repeated LlmEvaluationFeedback llm_evaluation_feedbacks = 7;

    // Resource name of the owning experiment.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string llm_evaluation_experiment_name = 8;

    // Wall-clock start of the evaluator run.
    google.protobuf.Timestamp started_at = 9;

    // Wall-clock end of the evaluator run.
    google.protobuf.Timestamp finished_at = 10;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 11;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 12;

    // User id in form of a valid UUID.
    string created_by = 13;

    // User id in form of a valid UUID.
    string modified_by = 14;

    // Per-turn results for multi-turn (conversation-flow) runs: one entry per
    // executed conversation turn, carrying expected vs. actual outputs and the
    // per-turn telemetry join key. Empty for single-turn runs.
    repeated LlmEvaluationTurnResult llm_evaluation_turn_results = 15;

    // Zero-based repetition index when the experiment ran with repetitions > 1.
    int32 repetition_index = 16;

    // Actual output produced by the target for this run (answer text, tool
    // calls, final state) — first-class so result views need not parse feedback
    // <code>raw</code> payloads.
    google.protobuf.Struct actual_output = 17;
}

// Family of evaluator implementations.
enum LlmEvaluationEvaluatorType {
    // Default / unset.
    LLM_EVALUATION_EVALUATOR_TYPE_UNSPECIFIED = 0;

    // LLM acting as a judge (LangSmith-style).
    LLM_EVALUATION_EVALUATOR_TYPE_LLM_AS_JUDGE = 1;

    // Human reviewer.
    LLM_EVALUATION_EVALUATOR_TYPE_HUMAN = 2;

    // Deterministic heuristic (regex, exact match, ...).
    LLM_EVALUATION_EVALUATOR_TYPE_HEURISTIC = 3;

    // Custom Python code provided by the user.
    LLM_EVALUATION_EVALUATOR_TYPE_CUSTOM_CODE = 4;

    // Pairwise comparison evaluator.
    LLM_EVALUATION_EVALUATOR_TYPE_PAIRWISE = 5;
}

// A single feedback record (score + optional categorical + comment + raw payload).
message LlmEvaluationFeedback {
    // The unique resource name of the feedback record. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;/evaluatorRuns/&lt;evaluator_run_uuid&gt;/feedbacks/&lt;feedback_uuid&gt;</code>.
    string name = 1;

    // Human-readable display name.
    string display_name = 2;

    // Free-form criterion label: "correctness", "faithfulness", "hallucination",
    // "context_precision", "tool_trajectory", "format", "groundedness", "tone",
    // "exact_match", "embedding_distance", "bleu", "rouge", "regression", ...
    string criterion = 3;

    // Numeric score (0.0-1.0 by convention). Defaults to 0.0 (proto3 has no field
    // presence on this scalar, so an unset score and a genuine 0.0 are indistinguishable);
    // for purely categorical feedback, rely on categorical_value rather than this field.
    double score = 4;

    // Categorical value when applicable ("pass" | "fail" | "yes" | "no" | tier).
    string categorical_value = 5;

    // Human-readable comment / rationale.
    string comment = 6;

    // Human reviewer id or "evaluator:&lt;name&gt;".
    string annotator_user_id = 7;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 8;

    // Verbatim evaluator JSON output kept for forensic replay.
    google.protobuf.Struct raw = 9;

    // Resource name of the owning evaluator run (may be empty for top-level
    // experiment-scoped feedback submitted via SubmitFeedback).
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;/evaluatorRuns/&lt;evaluator_run_uuid&gt;</code>.
    string llm_evaluation_evaluator_run_name = 10;

    // Resource name of the owning experiment.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string llm_evaluation_experiment_name = 11;

    // Resource name of the example the feedback targets.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;/examples/&lt;example_uuid&gt;</code>.
    string llm_evaluation_example_name = 12;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 13;

    // User id in form of a valid UUID.
    string created_by = 14;

    // User id in form of a valid UUID.
    string modified_by = 15;
}

// Pairwise comparison report across multiple experiments.
message LlmEvaluationComparison {
    // The unique resource name of the comparison. Read-only; populated by the server.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationComparisons/&lt;comparison_uuid&gt;</code>.
    string name = 1;

    // Human-readable display name.
    string display_name = 2;

    // Resource names of the experiments being compared (two-or-more).
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    repeated string llm_evaluation_experiment_names = 3;

    // Optional. Resource name of the baseline experiment used for delta computation.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string llm_evaluation_baseline_experiment_name = 4;

    // One entry per example.
    repeated LlmEvaluationPairwiseResult llm_evaluation_pairwise_results = 5;

    // Aggregate stats: win-rate, mean-delta, ...
    google.protobuf.Struct aggregate = 6;

    // Creation date and time. Read-only field.
    google.protobuf.Timestamp created_at = 7;

    // Modification date and time. Read-only field.
    google.protobuf.Timestamp modified_at = 8;

    // User id in form of a valid UUID.
    string created_by = 9;

    // User id in form of a valid UUID.
    string modified_by = 10;
}

// Per-example pairwise comparison entry.
message LlmEvaluationPairwiseResult {
    // Resource name of the example being compared.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationDatasets/&lt;dataset_uuid&gt;/examples/&lt;example_uuid&gt;</code>.
    string llm_evaluation_example_name = 1;

    // Resource name of the winning experiment.
    // Format: <code>projects/&lt;project_uuid&gt;/agent/llmEvaluationExperiments/&lt;experiment_uuid&gt;</code>.
    string llm_evaluation_winner_experiment_name = 2;

    // Score delta against the baseline (positive means winner improved).
    double score_delta = 3;

    // Free-form reason / rationale.
    string reason = 4;
}

